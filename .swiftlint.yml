# ClipVault SwiftLint Configuration
# Extended from conductor/code_styleguides/swift.md

# Error rules — must fix
force_unwrapping: error

# Warning thresholds
closure_body_length:
  warning: 50
function_body_length:
  warning: 100
type_body_length:
  warning: 400
file_length:
  warning: 600

# Opt-in rules
opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - last_where
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - prefer_zero_over_explicit_init
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - yoda_condition

# Project-specific
line_length:
  warning: 120
  error: 160
  ignores_comments: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - db
    - vm

# Paths to exclude
excluded:
  - .build/
  - Tests/
  - DerivedData/
